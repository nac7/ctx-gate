name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: tests & faithfulness gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime + dev + accurate-tokenizer deps. RAG extras are intentionally
          # omitted: the suite exercises the TF-IDF/in-memory fallback path.
          pip install fastapi "uvicorn[standard]" httpx pytest pytest-asyncio tiktoken

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Faithfulness gate (no required fact may be dropped)
        run: python ctx_gate.py eval --min-retention 1.0

      # Always publish the report — even if the gate failed — so a regression is
      # visible in the PR's artifacts, not just as a red X.
      - name: Generate faithfulness report
        if: always()
        run: python ctx_gate.py eval --json > faithfulness-report.json

      - name: Upload faithfulness report
        if: always() && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: faithfulness-report
          path: faithfulness-report.json
